<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
  <link rel="manifest" href="/manifest.json">
  <title>Zoho Inventory AI</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body { font-family: 'Segoe UI', sans-serif; background: #0f0a1e; color: #f1f0ff; min-height: 100vh; }
    .header { background: linear-gradient(135deg, #6d28d9, #4f46e5); padding: 24px 20px; text-align: center; }
    .header h1 { font-size: 22px; font-weight: 900; }
    .header p { color: #c4b5fd; font-size: 14px; margin-top: 4px; }
    .container { max-width: 680px; margin: 0 auto; padding: 24px 16px; }
    .card { background: #1e1535; border: 1px solid #3b2f6e; border-radius: 16px; padding: 24px; margin-bottom: 16px; }
    .btn-zoho { display: flex; align-items: center; justify-content: center; gap: 10px; background: #e8562a; color: white; border: none; border-radius: 12px; padding: 14px 28px; font-size: 16px; font-weight: 800; cursor: pointer; width: 100%; margin-top: 16px; text-decoration: none; }
    .btn-zoho:hover { background: #c94420; }
    .info-box { background: #12082a; border: 1px solid #4c1d95; border-radius: 10px; padding: 12px 16px; font-size: 13px; color: #a78bfa; margin-top: 10px; }
  </style>
</head>
<body>
<div class="header">
  <h1>📦 Zoho Inventory AI</h1>
  <p>Stock accuracy — Zoho Books + Claude AI</p>
</div>
<div class="container">
  <div class="card">
    <h2 style="font-size:18px;font-weight:900;margin-bottom:8px;">Connect your Zoho Books</h2>
    <p style="color:#a78bfa;font-size:14px;line-height:1.6;margin-bottom:4px;">Tap below to log in securely with Zoho. No passwords stored.</p>
    <div class="info-box">🔒 Your token is never stored on any server. It lives only in your browser session.</div>
    <a id="zoho-login-btn" class="btn-zoho" href="#">🔴 Connect with Zoho Books</a>
  </div>
</div>
<script>
  const clientId = '1000.9SH9M1UXASADRDGDMTYNNW56KNGUPZ';
  const redirect = encodeURIComponent('https://zoho-inventory-pq5p.vercel.app/api/callback');
  const scope = encodeURIComponent('ZohoBooks.fullaccess.all');
  document.getElementById('zoho-login-btn').href =
    `https://accounts.zoho.eu/oauth/v2/auth?scope=${scope}&client_id=${clientId}&response_type=code&access_type=online&redirect_uri=${redirect}`;
</script>
</body>
</html>
