<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="manifest" href="/manifest.json">
    <title>Zoho Inventory AI</title>
    <style>
        body {
            font-family: system-ui, -apple-system, sans-serif;
            background: #0f0a1e;
            color: white;
            text-align: center;
            padding: 20px;
        }
        .card {
            background: #1e1535;
            border-radius: 16px;
            padding: 24px;
            max-width: 500px;
            margin: 0 auto;
        }
        button {
            background: #e8562a;
            color: white;
            border: none;
            padding: 14px 28px;
            border-radius: 12px;
            font-size: 16px;
            margin-top: 16px;
            cursor: pointer;
        }
        input {
            width: 100%;
            padding: 10px;
            margin: 10px 0;
            border-radius: 8px;
            border: 1px solid #3b2f6e;
            background: #0f0a1e;
            color: white;
        }
        .info {
            background: #12082a;
            padding: 10px;
            border-radius: 8px;
            margin-top: 10px;
            font-size: 12px;
            color: #a78bfa;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>📦 Zoho Inventory AI</h1>
        <p>Stock accuracy — Zoho Books + Claude AI</p>
        <hr>
        <div class="info">✅ Connected to Zoho Books!</div>
        <label>Zoho Books Organization ID</label>
        <input type="text" placeholder="e.g. 20081234567" id="orgId">
        <button onclick="fetchItems()">📥 Fetch My Inventory from Zoho</button>
    </div>
    <script>
        function fetchItems() {
            const orgId = document.getElementById('orgId').value;
            alert('Fetching inventory for Org ID: ' + orgId);
        }
    </script>
</body>
</html>
